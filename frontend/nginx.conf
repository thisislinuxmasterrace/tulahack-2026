# Раздача SPA (Vue Router history) и прокси API на шлюз в docker-сети.
# На хосте Debian можно оставить системный nginx + certbot и проксировать на этот контейнер.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    error_log /dev/stderr info;
    access_log /dev/stdout combined;

    # Загрузка аудио через шлюз (multipart); дефолт nginx 1m даёт 413
    client_max_body_size 64m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location /api/ {
        client_max_body_size 64m;
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # На случай запросов без завершающего слэша
    location = /api {
        return 301 /api/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
