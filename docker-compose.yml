# Запуск: docker compose up --build
# Логи:   docker compose logs -f [gateway|runner|web|…]
# Подробный старт шлюза: GATEWAY_LOG_VERBOSE=1 в env сервиса gateway
#
# Переменные для подстановки (создайте .env рядом с этим файлом):
#   STT_BASE_URL, LLM_BASE_URL, REDACT_BASE_URL — HTTP-воркеры
#   S3_PUBLIC_BASE_URL — URL MinIO для браузера, напр. http://<хост>:9000
#   JWT_SECRET, WORKER_TOKEN — задайте свои значения в проде

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

# TODO фронтенд
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    logging: *default-logging
    ports:
      - "8081:80"
    depends_on:
      - gateway

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    logging: *default-logging
    stop_grace_period: 40s
    ports:
      - "8080:8080"
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-postgres,redis,minio,gateway,web,runner,127.0.0.1,localhost}
      GATEWAY_ADDR: ":8080"
      GATEWAY_LOG_VERBOSE: "1"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/app?sslmode=disable"
      JWT_SECRET: ${JWT_SECRET:-change-me-dev-only-min-32-chars-please}
      JWT_ACCESS_TTL_SEC: "900"
      JWT_REFRESH_TTL_SEC: "604800"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_AUDIO_QUEUE_KEY: "tulahack:queue:audio:process"
      S3_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin123"
      S3_BUCKET: "app"
      S3_USE_SSL: "false"
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://127.0.0.1:9000}
      SHUTDOWN_TIMEOUT_SEC: "30"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  runner:
    build:
      context: ./backend/runner
      dockerfile: Dockerfile
    logging: *default-logging
    restart: unless-stopped
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-postgres,redis,minio,gateway,web,runner,127.0.0.1,localhost}
      REDIS_URL: "redis://redis:6379/0"
      REDIS_AUDIO_QUEUE_KEY: "tulahack:queue:audio:process"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/app?sslmode=disable"
      S3_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin123"
      S3_BUCKET: "app"
      S3_USE_SSL: "false"
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://127.0.0.1:9000}
      # Задайте в .env (без коммита реальных хостов в репозиторий)
      STT_BASE_URL: ${STT_BASE_URL:-http://127.0.0.1:8001}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://127.0.0.1:8081}
      REDACT_BASE_URL: ${REDACT_BASE_URL:-http://127.0.0.1:8082}
      STT_HTTP_TIMEOUT_SEC: "600"
      LLM_HTTP_TIMEOUT_SEC: "120"
      REDACT_HTTP_TIMEOUT_SEC: "600"
      LOG_LEVEL: "info"
      # Обязательно задайте в .env; совпадает с WORKER_TOKEN на STT/LLM/Redact (иначе 401)
      WORKER_TOKEN: ${WORKER_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
