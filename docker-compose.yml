# Запуск: cp .env.example .env && docker compose up --build
# Логи:   docker compose logs -f [gateway|runner|web|…]
#
# Все значения подставляются из `.env` в корне репозитория (см. `.env.example`).

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    logging: *default-logging
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    logging: *default-logging
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      - gateway

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    logging: *default-logging
    stop_grace_period: ${GATEWAY_STOP_GRACE_PERIOD:-40s}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-postgres,redis,minio,gateway,web,runner,127.0.0.1,localhost}
      GATEWAY_ADDR: ${GATEWAY_ADDR:-:8080}
      GATEWAY_LOG_VERBOSE: ${GATEWAY_LOG_VERBOSE:-1}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-app}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-dev-only-min-32-chars-please}
      JWT_ACCESS_TTL_SEC: ${JWT_ACCESS_TTL_SEC:-900}
      JWT_REFRESH_TTL_SEC: ${JWT_REFRESH_TTL_SEC:-604800}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_AUDIO_QUEUE_KEY: ${REDIS_AUDIO_QUEUE_KEY:-tulahack:queue:audio:process}
      REDIS_JOB_STATUS_KEY_PREFIX: ${REDIS_JOB_STATUS_KEY_PREFIX:-}
      REDIS_JOB_EVENTS_CHANNEL_PREFIX: ${REDIS_JOB_EVENTS_CHANNEL_PREFIX:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-app}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://127.0.0.1:9000}
      SHUTDOWN_TIMEOUT_SEC: ${SHUTDOWN_TIMEOUT_SEC:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  runner:
    build:
      context: ./backend/runner
      dockerfile: Dockerfile
    logging: *default-logging
    restart: unless-stopped
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-postgres,redis,minio,gateway,web,runner,127.0.0.1,localhost}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_AUDIO_QUEUE_KEY: ${REDIS_AUDIO_QUEUE_KEY:-tulahack:queue:audio:process}
      REDIS_BRPOP_TIMEOUT_SEC: ${REDIS_BRPOP_TIMEOUT_SEC:-5}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-app}?sslmode=disable
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-app}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://127.0.0.1:9000}
      STT_BASE_URL: ${STT_BASE_URL:-http://127.0.0.1:8001}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://127.0.0.1:8081}
      REDACT_BASE_URL: ${REDACT_BASE_URL:-http://127.0.0.1:8082}
      STT_HTTP_TIMEOUT_SEC: ${STT_HTTP_TIMEOUT_SEC:-600}
      LLM_HTTP_TIMEOUT_SEC: ${LLM_HTTP_TIMEOUT_SEC:-600}
      REDACT_HTTP_TIMEOUT_SEC: ${REDACT_HTTP_TIMEOUT_SEC:-600}
      HTTP_MAX_ATTEMPTS: ${HTTP_MAX_ATTEMPTS:-5}
      HTTP_RETRY_BASE_SEC: ${HTTP_RETRY_BASE_SEC:-1.0}
      WORKER_QUEUE_RETRIES: ${WORKER_QUEUE_RETRIES:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_TOKEN: ${WORKER_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
